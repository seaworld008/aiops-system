name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aiops
          POSTGRES_PASSWORD: aiops-test-only
          POSTGRES_DB: aiops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aiops -d aiops_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      AIOPS_TEST_POSTGRES_DSN: postgres://aiops:aiops-test-only@127.0.0.1:5432/aiops_test?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go mod download
      - run: go mod verify
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - run: git diff --check
      - run: go test -race -shuffle=on -count=1 ./...
      - run: go vet ./...
      - run: go build ./cmd/control-plane ./cmd/worker ./cmd/runner

  vulnerability-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go mod download
      - name: Scan reachable Go vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

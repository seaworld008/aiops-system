name: ci

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go mod download
      - run: go mod verify
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - run: git diff --check
      - run: go vet ./...
      - run: go build ./cmd/control-plane ./cmd/worker ./cmd/read-runner ./cmd/write-runner ./cmd/executor

  full-go:
    if: github.event_name == 'workflow_dispatch'
    needs: go
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18.4-alpine3.24@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_USER: aiops
          POSTGRES_PASSWORD: aiops-test-only
          POSTGRES_DB: aiops_test
          POSTGRES_INITDB_ARGS: --data-checksums
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aiops -d aiops_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      vault:
        image: hashicorp/vault:2.0.3
        env:
          VAULT_ADDR: http://127.0.0.1:8200
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
          VAULT_DEV_ROOT_TOKEN_ID: aiops-vault-test-only
        ports:
          - 8200:8200
        options: >-
          --cap-add=IPC_LOCK
          --health-cmd "vault status"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      AIOPS_TEST_POSTGRES_DSN: postgres://aiops:aiops-test-only@127.0.0.1:5432/aiops_test?sslmode=disable
      AIOPS_TEST_VAULT_ADDR: http://127.0.0.1:8200
      AIOPS_TEST_VAULT_POSTGRES_HOST: postgres:5432
      AIOPS_TEST_VAULT_ROOT_TOKEN: aiops-vault-test-only
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go mod download
      - run: go mod verify
      - name: Provision exact PostgreSQL role ABI
        shell: bash
        env:
          PGPASSWORD: aiops-test-only
        run: |
          set -euo pipefail
          postgres_image='docker.io/library/postgres:18.4-alpine3.24@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15'
          migration_password="$(openssl rand -hex 32)"
          application_password="$(openssl rand -hex 32)"
          source_gate_seal_password="$(openssl rand -hex 32)"
          source_gate_admit_password="$(openssl rand -hex 32)"
          admin_password='aiops-test-only'
          passwords=(
            "${admin_password}"
            "${migration_password}"
            "${application_password}"
            "${source_gate_seal_password}"
            "${source_gate_admit_password}"
          )
          for ((left = 0; left < ${#passwords[@]}; left++)); do
            for ((right = left + 1; right < ${#passwords[@]}; right++)); do
              test "${passwords[left]}" != "${passwords[right]}"
            done
          done
          unset passwords
          echo "::add-mask::${migration_password}"
          echo "::add-mask::${application_password}"
          echo "::add-mask::${source_gate_seal_password}"
          echo "::add-mask::${source_gate_admit_password}"

          export AIOPS_BOOTSTRAP_MIGRATION_PASSWORD="${migration_password}"
          export AIOPS_BOOTSTRAP_APPLICATION_PASSWORD="${application_password}"
          export AIOPS_BOOTSTRAP_SOURCE_GATE_SEAL_PASSWORD="${source_gate_seal_password}"
          export AIOPS_BOOTSTRAP_SOURCE_GATE_ADMIT_PASSWORD="${source_gate_admit_password}"
          docker run --rm --network host --interactive \
            --env PGPASSWORD \
            --env AIOPS_BOOTSTRAP_MIGRATION_PASSWORD \
            --env AIOPS_BOOTSTRAP_APPLICATION_PASSWORD \
            --env AIOPS_BOOTSTRAP_SOURCE_GATE_SEAL_PASSWORD \
            --env AIOPS_BOOTSTRAP_SOURCE_GATE_ADMIT_PASSWORD \
            "${postgres_image}" \
            psql -X --set ON_ERROR_STOP=1 \
              --host 127.0.0.1 --port 5432 --username aiops --dbname aiops_test <<'SQL'
          \getenv migration_password AIOPS_BOOTSTRAP_MIGRATION_PASSWORD
          \getenv application_password AIOPS_BOOTSTRAP_APPLICATION_PASSWORD
          \getenv source_gate_seal_password AIOPS_BOOTSTRAP_SOURCE_GATE_SEAL_PASSWORD
          \getenv source_gate_admit_password AIOPS_BOOTSTRAP_SOURCE_GATE_ADMIT_PASSWORD
          BEGIN;
          CREATE ROLE aiops_migrator
            LOGIN NOINHERIT NOSUPERUSER NOCREATEDB NOCREATEROLE NOREPLICATION NOBYPASSRLS
            PASSWORD :'migration_password';
          CREATE ROLE aiops_schema_owner
            NOLOGIN NOINHERIT NOSUPERUSER NOCREATEDB NOCREATEROLE NOREPLICATION NOBYPASSRLS;
          CREATE ROLE aiops_control_plane_runtime
            NOLOGIN NOINHERIT NOSUPERUSER NOCREATEDB NOCREATEROLE NOREPLICATION NOBYPASSRLS;
          CREATE ROLE aiops_control_plane_workload
            LOGIN INHERIT NOSUPERUSER NOCREATEDB NOCREATEROLE NOREPLICATION NOBYPASSRLS
            PASSWORD :'application_password';
          CREATE ROLE aiops_source_gate_sealer
            LOGIN NOINHERIT NOSUPERUSER NOCREATEDB NOCREATEROLE NOREPLICATION NOBYPASSRLS
            PASSWORD :'source_gate_seal_password';
          CREATE ROLE aiops_source_gate_admitter
            LOGIN NOINHERIT NOSUPERUSER NOCREATEDB NOCREATEROLE NOREPLICATION NOBYPASSRLS
            PASSWORD :'source_gate_admit_password';
          GRANT aiops_schema_owner TO aiops_migrator
            WITH ADMIN FALSE, INHERIT FALSE, SET TRUE;
          GRANT aiops_control_plane_runtime TO aiops_control_plane_workload
            WITH ADMIN FALSE, INHERIT TRUE, SET FALSE;
          DO $$
          DECLARE
            capability_role_oids oid[] := ARRAY[
              'aiops_source_gate_sealer'::regrole::oid,
              'aiops_source_gate_admitter'::regrole::oid
            ];
          BEGIN
            IF (
              SELECT count(*)
              FROM pg_catalog.pg_roles
              WHERE rolname IN ('aiops_source_gate_sealer', 'aiops_source_gate_admitter')
                AND rolcanlogin
                AND NOT rolinherit
                AND NOT rolsuper
                AND NOT rolcreatedb
                AND NOT rolcreaterole
                AND NOT rolreplication
                AND NOT rolbypassrls
            ) <> 2 THEN
              RAISE EXCEPTION 'Source Gate capability role flags are not exact';
            END IF;
            IF EXISTS (
              SELECT 1
              FROM pg_catalog.pg_auth_members
              WHERE member = ANY (capability_role_oids)
                 OR roleid = ANY (capability_role_oids)
            ) THEN
              RAISE EXCEPTION 'Source Gate capability roles must not have membership edges';
            END IF;
            IF EXISTS (
              SELECT 1
              FROM pg_catalog.pg_database AS database_role
              CROSS JOIN LATERAL pg_catalog.aclexplode(
                COALESCE(
                  database_role.datacl,
                  pg_catalog.acldefault('d', database_role.datdba)
                )
              ) AS acl
              WHERE database_role.datname = pg_catalog.current_database()
                AND acl.grantee = ANY (capability_role_oids)
            ) THEN
              RAISE EXCEPTION 'Source Gate capability roles must not have direct control-database ACL';
            END IF;
            IF EXISTS (
              SELECT 1
              FROM pg_catalog.pg_namespace AS namespace_role
              CROSS JOIN LATERAL pg_catalog.aclexplode(
                COALESCE(
                  namespace_role.nspacl,
                  pg_catalog.acldefault('n', namespace_role.nspowner)
                )
              ) AS acl
              WHERE acl.grantee = ANY (capability_role_oids)
            ) THEN
              RAISE EXCEPTION 'Source Gate capability roles must not have direct schema ACL';
            END IF;
          END
          $$;
          COMMIT;
          SQL

          # These sslmode=disable URLs are CI identity fixtures only. They are
          # never TLS qualification or local G2 evidence.
          migration_dsn="postgres://aiops_migrator:${migration_password}@127.0.0.1:5432/aiops_test?sslmode=disable"
          application_dsn="postgres://aiops_control_plane_workload:${application_password}@127.0.0.1:5432/aiops_test?sslmode=disable"
          source_gate_seal_dsn="postgres://aiops_source_gate_sealer:${source_gate_seal_password}@127.0.0.1:5432/aiops_test?sslmode=disable"
          source_gate_admit_dsn="postgres://aiops_source_gate_admitter:${source_gate_admit_password}@127.0.0.1:5432/aiops_test?sslmode=disable"
          dsns=(
            "${AIOPS_TEST_POSTGRES_DSN}"
            "${migration_dsn}"
            "${application_dsn}"
            "${source_gate_seal_dsn}"
            "${source_gate_admit_dsn}"
          )
          for ((left = 0; left < ${#dsns[@]}; left++)); do
            for ((right = left + 1; right < ${#dsns[@]}; right++)); do
              test "${dsns[left]}" != "${dsns[right]}"
            done
          done
          unset dsns

          probe_control_identity() {
            AIOPS_CI_IDENTITY_DSN=$1
            AIOPS_CI_EXPECTED_IDENTITY=$2
            export AIOPS_CI_IDENTITY_DSN AIOPS_CI_EXPECTED_IDENTITY
            identity="$(
              docker run --rm --network host \
                --env AIOPS_CI_IDENTITY_DSN \
                --env AIOPS_CI_EXPECTED_IDENTITY \
                --entrypoint sh \
                "${postgres_image}" \
                -euc '
                  psql -X -v ON_ERROR_STOP=1 \
                    --dbname "$AIOPS_CI_IDENTITY_DSN" \
                    -Atc "SELECT session_user || '\''|'\'' || current_user"
                '
            )"
            test "${identity}" = "${AIOPS_CI_EXPECTED_IDENTITY}|${AIOPS_CI_EXPECTED_IDENTITY}"
            unset identity AIOPS_CI_IDENTITY_DSN AIOPS_CI_EXPECTED_IDENTITY
          }

          probe_control_identity "${AIOPS_TEST_POSTGRES_DSN}" aiops
          probe_control_identity "${migration_dsn}" aiops_migrator
          probe_control_identity "${application_dsn}" aiops_control_plane_workload
          probe_control_identity "${source_gate_seal_dsn}" aiops_source_gate_sealer
          probe_control_identity "${source_gate_admit_dsn}" aiops_source_gate_admitter

          {
            printf 'AIOPS_TEST_POSTGRES_MIGRATION_DSN=%s\n' "${migration_dsn}"
            printf 'AIOPS_TEST_POSTGRES_APPLICATION_DSN=%s\n' "${application_dsn}"
            printf 'AIOPS_TEST_POSTGRES_SOURCE_GATE_SEAL_DSN=%s\n' "${source_gate_seal_dsn}"
            printf 'AIOPS_TEST_POSTGRES_SOURCE_GATE_ADMIT_DSN=%s\n' "${source_gate_admit_dsn}"
          } >> "${GITHUB_ENV}"
          unset admin_password migration_password application_password \
            source_gate_seal_password source_gate_admit_password \
            migration_dsn application_dsn source_gate_seal_dsn source_gate_admit_dsn \
            AIOPS_BOOTSTRAP_MIGRATION_PASSWORD AIOPS_BOOTSTRAP_APPLICATION_PASSWORD \
            AIOPS_BOOTSTRAP_SOURCE_GATE_SEAL_PASSWORD AIOPS_BOOTSTRAP_SOURCE_GATE_ADMIT_PASSWORD
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - run: git diff --check
      - run: go test -race -shuffle=on -count=1 ./...
      - run: go vet ./...
      - run: go build ./cmd/control-plane ./cmd/worker ./cmd/read-runner ./cmd/write-runner ./cmd/executor

  vulnerability-scan:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go mod download
      - name: Scan reachable Go vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  temporal-integration:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AIOPS_TEMPORAL_INTEGRATION: "1"
      AIOPS_TEMPORAL_CLI_VERSION: "1.6.1"
      AIOPS_TEMPORAL_ADDRESS: 127.0.0.1:7233
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go mod download
      - name: Install pinned Temporal CLI
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/temporal_cli_1.6.1_linux_amd64.tar.gz"
          install_dir="${RUNNER_TEMP}/temporal-cli-1.6.1"
          curl --fail --silent --show-error --location \
            --output "${archive}" \
            https://github.com/temporalio/cli/releases/download/v1.6.1/temporal_cli_1.6.1_linux_amd64.tar.gz
          echo "85cfd2134eff7408e9e363f71a50f6d91f5df5f72eafa9eb87102d3793904faf  ${archive}" | sha256sum --check --strict
          mkdir -p "${install_dir}"
          tar --extract --gzip --file "${archive}" --directory "${install_dir}"
          test "$("${install_dir}/temporal" --version | awk '{print $3}')" = "1.6.1"
          echo "${install_dir}" >> "${GITHUB_PATH}"
      - name: Start pinned Temporal dev server
        shell: bash
        run: |
          set -euo pipefail
          temporal server start-dev \
            --headless \
            --ip 127.0.0.1 \
            --port 7233 \
            --db-filename "${RUNNER_TEMP}/temporal-integration.db" \
            >"${RUNNER_TEMP}/temporal-server.log" 2>&1 &
          echo "$!" > "${RUNNER_TEMP}/temporal-server.pid"
          for attempt in $(seq 1 60); do
            if temporal operator cluster health \
              --address "${AIOPS_TEMPORAL_ADDRESS}" \
              --command-timeout 2s >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          cat "${RUNNER_TEMP}/temporal-server.log" >&2
          exit 1
      - name: Run Temporal orchestration, READ Activity, history and replay contracts
        run: go test -race -shuffle=on -count=1 ./internal/investigationworkflow ./internal/readrunneractivity -run '^TestTemporalDevServer'
      - name: Stop Temporal dev server
        if: always()
        shell: bash
        run: |
          if [ -f "${RUNNER_TEMP}/temporal-server.pid" ]; then
            kill "$(cat "${RUNNER_TEMP}/temporal-server.pid")" >/dev/null 2>&1 || true
          fi
          if [ "${{ job.status }}" != "success" ] && [ -f "${RUNNER_TEMP}/temporal-server.log" ]; then
            cat "${RUNNER_TEMP}/temporal-server.log" >&2
          fi

  runner-images:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GO_BUILD_IMAGE: docker.io/library/golang:1.26.5-bookworm
      READ_RUNNER_IMAGE: aiops-read-runner:ci
      WRITE_RUNNER_IMAGE: aiops-write-runner:ci
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build split Runner images
        run: make runner-images
      - name: Verify image trust boundaries
        shell: bash
        run: |
          set -euxo pipefail
          test "$(docker image inspect --format '{{.Config.User}}' "${READ_RUNNER_IMAGE}")" = "65532:65532"
          test "$(docker image inspect --format '{{.Config.User}}' "${WRITE_RUNNER_IMAGE}")" = "65532:65532"
          test "$(docker image inspect --format '{{index .Config.Entrypoint 0}}' "${READ_RUNNER_IMAGE}")" = "/usr/local/bin/aiops-read-runner"
          test "$(docker image inspect --format '{{index .Config.Entrypoint 0}}' "${WRITE_RUNNER_IMAGE}")" = "/usr/local/bin/aiops-write-runner"
          docker image inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "${WRITE_RUNNER_IMAGE}" |
            grep -Fxq 'AIOPS_WRITE_EXECUTION_MODE=disabled'

          read_container="$(docker create "${READ_RUNNER_IMAGE}")"
          write_container="$(docker create "${WRITE_RUNNER_IMAGE}")"
          probe_container=""
          cleanup() {
            if [ -n "${probe_container}" ]; then docker rm -f "${probe_container}" >/dev/null 2>&1 || true; fi
            docker rm -f "${read_container}" "${write_container}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker export --output=/tmp/read-runner.tar "${read_container}"
          docker export --output=/tmp/write-runner.tar "${write_container}"
          tar -tf /tmp/read-runner.tar > /tmp/read-runner.files
          tar -tf /tmp/write-runner.tar > /tmp/write-runner.files
          tar --numeric-owner -tvf /tmp/write-runner.tar | grep -E '(^| )(usr/local/libexec/|usr/local/libexec/aiops-executor)$'

          grep -Fxq 'usr/local/bin/aiops-read-runner' /tmp/read-runner.files
          ! grep -Eq 'aiops-(write-runner|executor)$' /tmp/read-runner.files
          grep -Fxq 'usr/local/bin/aiops-write-runner' /tmp/write-runner.files
          grep -Fxq 'usr/local/libexec/aiops-executor' /tmp/write-runner.files
          ! grep -Eq 'aiops-read-runner$' /tmp/write-runner.files
          ! grep -Eq '^tmp/?$' /tmp/write-runner.files
          ! grep -Eq '(^|/)(ba|da|z|a|k)?sh$|(^|/)busybox$' /tmp/read-runner.files /tmp/write-runner.files
          test "$(tar --numeric-owner -tvf /tmp/write-runner.tar | awk '$6 == "usr/local/libexec/" {print $1, $2}')" = "drwxr-xr-x 0/0"
          test "$(tar --numeric-owner -tvf /tmp/write-runner.tar | awk '$6 == "usr/local/libexec/aiops-executor" {print $1, $2}')" = "-r-xr-xr-x 0/0"

          probe_container="$(docker run --detach --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --tmpfs /tmp:rw,nosuid,nodev,noexec,size=16m,mode=0700,uid=65532,gid=65532 \
            --env AIOPS_WRITE_EXECUTION_MODE=non-production "${WRITE_RUNNER_IMAGE}")"
          sleep 1
          if [ "$(docker inspect --format '{{.State.Running}}' "${probe_container}")" != "true" ]; then
            docker logs "${probe_container}" >&2
            docker inspect --format 'exit={{.State.ExitCode}} error={{.State.Error}}' "${probe_container}" >&2
            exit 1
          fi
          docker stop --time 5 "${probe_container}" >/dev/null
          docker rm "${probe_container}" >/dev/null
          probe_container=""

          probe_container="$(docker run --detach --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --env AIOPS_WRITE_EXECUTION_MODE=non-production "${WRITE_RUNNER_IMAGE}")"
          sleep 1
          test "$(docker inspect --format '{{.State.Running}}' "${probe_container}")" = "false"
          test "$(docker inspect --format '{{.State.ExitCode}}' "${probe_container}")" != "0"
          docker rm "${probe_container}" >/dev/null
          probe_container=""

          probe_container="$(docker run --detach --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --tmpfs /tmp:rw,nosuid,nodev,noexec,size=32m,mode=0750,uid=65532,gid=65532 \
            --env AIOPS_WRITE_EXECUTION_MODE=non-production "${WRITE_RUNNER_IMAGE}")"
          sleep 1
          test "$(docker inspect --format '{{.State.Running}}' "${probe_container}")" = "false"
          test "$(docker inspect --format '{{.State.ExitCode}}' "${probe_container}")" != "0"
          docker rm "${probe_container}" >/dev/null
          probe_container=""

          if docker run --rm --env AIOPS_WRITE_EXECUTION_MODE=production "${WRITE_RUNNER_IMAGE}"; then
            echo "production write mode unexpectedly started" >&2
            exit 1
          fi

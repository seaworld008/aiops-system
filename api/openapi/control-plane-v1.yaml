  schemas:
    UUID:
      type: string
      format: uuid
      pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    TraceID:
      type: string
      pattern: "^[a-f0-9]{32}$"
    Digest:
      type: string
      pattern: "^[a-f0-9]{64}$"
    NullableUUID:
      type: [string, "null"]
      format: uuid
      pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    NullableDigest:
      type: [string, "null"]
      pattern: "^[a-f0-9]{64}$"
    NullableDateTime:
      type: [string, "null"]
      format: date-time
    NullableSafeText:
      type: [string, "null"]
      minLength: 1
      maxLength: 256
    EffectiveAction:
      type: string
      enum:
        - CREATE_ASSET
        - EDIT_GOVERNANCE
        - QUARANTINE
        - RETIRE
        - CREATE_BINDING
        - DELETE_BINDING
        - RESOLVE_CONFLICT
    AssetKind:
      type: string
      enum:
        - SERVICE
        - LINUX_VM
        - WINDOWS_VM
        - BARE_METAL_HOST
        - KUBERNETES_CLUSTER
        - KUBERNETES_NAMESPACE
        - KUBERNETES_WORKLOAD
        - DATABASE_INSTANCE
        - DATABASE
        - METRICS_SOURCE
        - LOG_SOURCE
        - TRACE_SOURCE
        - AWX_INVENTORY
        - ARGO_APPLICATION
        - CI_PIPELINE
        - GIT_REPOSITORY
        - CLOUD_RESOURCE
    AssetLifecycle:
      type: string
      enum: [DISCOVERED, ACTIVE, STALE, QUARANTINED, RETIRED]
    MappingStatus:
      type: string
      enum: [EXACT, AMBIGUOUS, UNRESOLVED]
    Criticality:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]
    DataClassification:
      type: string
      enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
    AssetSort:
      type: string
      enum: [display_name_asc, last_observed_at_desc]
      default: display_name_asc
    RelationshipType:
      type: string
      enum:
        - RUNS_ON
        - CONTAINS
        - DEPENDS_ON
        - MONITORED_BY
        - LOGS_TO
        - TRACES_TO
        - DELIVERED_BY
        - MANAGED_BY
        - PRIMARY_RUNTIME_FOR
    RelationshipStatus:
      type: string
      enum: [ACTIVE, INACTIVE]
    BindingRole:
      type: string
      enum: [PRIMARY_RUNTIME, DEPENDENCY, OBSERVABILITY_SOURCE, DELIVERY_TARGET, MANAGED_TARGET]
    BindingStatus:
      type: string
      enum: [ACTIVE, INACTIVE]
    Provenance:
      type: string
      enum: [MANUAL, DISCOVERED, MERGE_DECISION]
    SourceKind:
      type: string
      enum:
        - MANUAL
        - CSV_IMPORT
        - CONTROL_PLANE_API
        - EXTERNAL_CMDB
        - VSPHERE
        - PROXMOX
        - OPENSTACK
        - CLOUD_PROVIDER
        - KUBERNETES_OPERATOR
        - AWX_INVENTORY
    SourceStatus:
      type: string
      enum: [ACTIVE, PAUSED, DEGRADED, DISABLED]
    SourceGateStatus:
      type: string
      enum: [UNAVAILABLE, VALIDATING, AVAILABLE, DEGRADED, SUSPENDED]
    SourceRevisionStatus:
      type: string
      enum: [DRAFT, VALIDATING, VALIDATED, REJECTED, PUBLISHED, SUPERSEDED]
    RunKind:
      type: string
      enum: [VALIDATION, DISCOVERY, CSV_IMPORT, API_INGESTION, MANUAL_MUTATION]
    RunStatus:
      type: string
      enum: [QUEUED, DELAYED, RUNNING, FINALIZING, SUCCEEDED, PARTIAL, FAILED, CANCELLED]
    RunStage:
      type: string
      enum: [WAITING, DELAYED, VALIDATING, READING, NORMALIZING, APPLYING, CLEANING_UP, COMPLETED]
    TriggerType:
      type: string
      enum: [HUMAN, API, SCHEDULED]
    CredentialCleanupStatus:
      type: string
      enum: [NOT_OPENED, PENDING, REVOKED, NO_CREDENTIAL, UNCERTAIN]
    ConflictStatus:
      type: string
      enum: [OPEN, RESOLVED, REJECTED]
    ConflictResolution:
      type: string
      enum: [CONFIRM_EXACT, REJECT_CANDIDATE, KEEP_UNRESOLVED, QUARANTINE_ASSET]
    FieldOwnership:
      type: string
      enum: [SOURCE, GOVERNANCE, MERGE_DECISION]
    BrowserConfig:
      type: object
      additionalProperties: false
      required: [oidc, api_base_path, build]
      properties:
        oidc:
          $ref: "#/components/schemas/BrowserOIDCConfig"
        api_base_path:
          type: string
          const: /api/v1
        build:
          $ref: "#/components/schemas/BrowserBuildInfo"
    BrowserOIDCConfig:
      type: object
      additionalProperties: false
      required: [url, realm, client_id]
      properties:
        url:
          type: string
          format: uri
          pattern: "^https://"
          maxLength: 2048
        realm:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
        client_id:
          type: string
          const: control-plane-web
    BrowserBuildInfo:
      type: object
      additionalProperties: false
      required: [version, commit, contract_digest]
      properties:
        version:
          type: string
          minLength: 1
          maxLength: 128
        commit:
          type: string
          minLength: 1
          maxLength: 128
        contract_digest:
          type: string
          pattern: "^sha256:[a-f0-9]{64}$"
    PageMeta:
      type: object
      additionalProperties: false
      required: [next_cursor]
      properties:
        next_cursor:
          type: [string, "null"]
          maxLength: 2048
          pattern: "^[A-Za-z0-9_-]+$"
    Label:
      type: object
      additionalProperties: false
      required: [key, value]
      properties:
        key:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[A-Za-z0-9][A-Za-z0-9_.-]{0,63}$"
        value:
          type: string
          maxLength: 1024
    SourceReference:
      type: object
      additionalProperties: false
      required: [id, name, kind]
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        name:
          type: string
          minLength: 1
          maxLength: 256
        kind:
          $ref: "#/components/schemas/SourceKind"
    ServiceReference:
      type: object
      additionalProperties: false
      required: [id, name, role]
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        name:
          type: string
          minLength: 1
          maxLength: 256
        role:
          $ref: "#/components/schemas/BindingRole"
    ConnectionSummary:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          const: NOT_CONFIGURED
    CapabilitySummary:
      type: object
      additionalProperties: false
      required: [status, count]
      properties:
        status:
          type: string
          const: NOT_CONFIGURED
        count:
          type: integer
          format: int64
          minimum: 0
    AssetSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - environment_id
        - display_name
        - external_id
        - kind
        - provider_kind
        - source
        - service_summaries
        - mapping_status
        - lifecycle
        - owner_group
        - criticality
        - data_classification
        - labels
        - connection_summary
        - capability_summary
        - last_observed_at
        - version
        - effective_actions
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        environment_id:
          $ref: "#/components/schemas/UUID"
        display_name:
          type: string
          minLength: 1
          maxLength: 256
        external_id:
          type: string
          minLength: 1
          maxLength: 512
        kind:
          $ref: "#/components/schemas/AssetKind"
        provider_kind:
          type: string
          pattern: "^[A-Z][A-Z0-9_]{0,63}$"
        source:
          $ref: "#/components/schemas/SourceReference"
        service_summaries:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/ServiceReference"
        mapping_status:
          $ref: "#/components/schemas/MappingStatus"
        lifecycle:
          $ref: "#/components/schemas/AssetLifecycle"
        owner_group:
          $ref: "#/components/schemas/NullableSafeText"
        criticality:
          $ref: "#/components/schemas/Criticality"
        data_classification:
          $ref: "#/components/schemas/DataClassification"
        labels:
          type: array
          maxItems: 64
          items:
            $ref: "#/components/schemas/Label"
        connection_summary:
          $ref: "#/components/schemas/ConnectionSummary"
        capability_summary:
          $ref: "#/components/schemas/CapabilitySummary"
        last_observed_at:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
          minimum: 1
        effective_actions:
          type: array
          maxItems: 7
          uniqueItems: true
          items:
            $ref: "#/components/schemas/EffectiveAction"
    FieldProvenance:
      type: object
      additionalProperties: false
      required: [field_code, source_id, provider_kind, source_revision, observed_at, provider_path_code, confidence, ownership]
      properties:
        field_code:
          type: string
          minLength: 1
          maxLength: 128
        source_id:
          $ref: "#/components/schemas/UUID"
        provider_kind:
          type: string
          pattern: "^[A-Z][A-Z0-9_]{0,63}$"
        source_revision:
          type: integer
          format: int64
          minimum: 1
        observed_at:
          type: string
          format: date-time
        provider_path_code:
          type: string
          minLength: 1
          maxLength: 128
        confidence:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        ownership:
          $ref: "#/components/schemas/FieldOwnership"
    RelationCounts:
      type: object
      additionalProperties: false
      required: [incoming, outgoing]
      properties:
        incoming:
          type: integer
          format: int64
          minimum: 0
        outgoing:
          type: integer
          format: int64
          minimum: 0
    AssetDetail:
      type: object
      additionalProperties: false
      required:
        - id
        - environment_id
        - display_name
        - external_id
        - kind
        - provider_kind
        - source
        - service_summaries
        - mapping_status
        - lifecycle
        - owner_group
        - criticality
        - data_classification
        - labels
        - connection_summary
        - capability_summary
        - last_observed_at
        - version
        - effective_actions
        - field_provenance
        - relation_counts
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        environment_id:
          $ref: "#/components/schemas/UUID"
        display_name:
          type: string
          minLength: 1
          maxLength: 256
        external_id:
          type: string
          minLength: 1
          maxLength: 512
        kind:
          $ref: "#/components/schemas/AssetKind"
        provider_kind:
          type: string
          pattern: "^[A-Z][A-Z0-9_]{0,63}$"
        source:
          $ref: "#/components/schemas/SourceReference"
        service_summaries:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/ServiceReference"
        mapping_status:
          $ref: "#/components/schemas/MappingStatus"
        lifecycle:
          $ref: "#/components/schemas/AssetLifecycle"
        owner_group:
          $ref: "#/components/schemas/NullableSafeText"
        criticality:
          $ref: "#/components/schemas/Criticality"
        data_classification:
          $ref: "#/components/schemas/DataClassification"
        labels:
          type: array
          maxItems: 64
          items:
            $ref: "#/components/schemas/Label"
        connection_summary:
          $ref: "#/components/schemas/ConnectionSummary"
        capability_summary:
          $ref: "#/components/schemas/CapabilitySummary"
        last_observed_at:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
          minimum: 1
        effective_actions:
          type: array
          maxItems: 7
          uniqueItems: true
          items:
            $ref: "#/components/schemas/EffectiveAction"
        field_provenance:
          type: array
          maxItems: 256
          items:
            $ref: "#/components/schemas/FieldProvenance"
        relation_counts:
          $ref: "#/components/schemas/RelationCounts"
    AssetPage:
      type: object
      additionalProperties: false
      required: [items, page, effective_actions]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/AssetSummary"
        page:
          $ref: "#/components/schemas/PageMeta"
        effective_actions:
          type: array
          maxItems: 7
          uniqueItems: true
          items:
            $ref: "#/components/schemas/EffectiveAction"
    CreateAssetRequest:
      type: object
      additionalProperties: false
      required: [source_id, kind, external_id, display_name, owner_group, criticality, data_classification, labels]
      properties:
        source_id:
          $ref: "#/components/schemas/UUID"
        kind:
          $ref: "#/components/schemas/AssetKind"
        external_id:
          type: string
          minLength: 1
          maxLength: 512
        display_name:
          type: string
          minLength: 1
          maxLength: 256
        owner_group:
          $ref: "#/components/schemas/NullableSafeText"
        criticality:
          $ref: "#/components/schemas/Criticality"
        data_classification:
          $ref: "#/components/schemas/DataClassification"
        labels:
          type: array
          maxItems: 64
          uniqueItems: true
          items:
            $ref: "#/components/schemas/Label"
    PatchAssetRequest:
      type: object
      additionalProperties: false
      required: [display_name, owner_group, criticality, data_classification, labels]
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 256
        owner_group:
          $ref: "#/components/schemas/NullableSafeText"
        criticality:
          $ref: "#/components/schemas/Criticality"
        data_classification:
          $ref: "#/components/schemas/DataClassification"
        labels:
          type: array
          maxItems: 64
          uniqueItems: true
          items:
            $ref: "#/components/schemas/Label"
    TransitionAssetRequest:
      type: object
      additionalProperties: false
      required: [reason_code]
      properties:
        reason_code:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[A-Z][A-Z0-9_]{0,127}$"
    MutationReceipt:
      type: object
      additionalProperties: false
      required: [audit_id, trace_id, idempotent_replay]
      properties:
        audit_id:
          $ref: "#/components/schemas/UUID"
        trace_id:
          $ref: "#/components/schemas/TraceID"
        idempotent_replay:
